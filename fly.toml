app = "supplierio-mcp"
primary_region = "iad"

[env]
  LOG_PATH = "/app/logs/usage.log"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "logs_vol"
  destination = "/app/logs"
